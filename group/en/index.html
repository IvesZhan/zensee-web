<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fef9f1" />
  <meta name="theme-color" content="#fef9f1" />
  <title>Group Details</title>
  <meta name="description" content="Open a ZenSee invitation link, review the group details, and join the group in the app." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ZenSee | Group Invitation" />
  <meta property="og:description" content="Open a ZenSee invitation link, review the group details, and join the group in the app." />
  <meta property="og:url" content="https://iveszhan.github.io/zensee-web/group/en/" />
  <meta property="og:image" content="https://iveszhan.github.io/zensee-web/download/brand-favicon.png" />
  <meta property="og:image:width" content="256" />
  <meta property="og:image:height" content="256" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ZenSee | Group Invitation" />
  <meta name="twitter:description" content="Open a ZenSee invitation link, review the group details, and join the group in the app." />
  <meta name="twitter:image" content="https://iveszhan.github.io/zensee-web/download/brand-favicon.png" />
  <link rel="icon" type="image/png" href="../../download/brand-favicon.png?v=1" />
  <link rel="apple-touch-icon" href="../../download/brand-favicon.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Serif:wght@400;700;800&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared-header.css" />
  <link rel="stylesheet" href="../web.css" />
</head>
<body>
  <div class="page-shell" id="top">
    <div
      id="shared-header"
      data-header-locale="en"
      data-header-home-url="../../download/en/"
      data-header-support-url="https://iveszhan.github.io/zensee-web/support/en/"
      data-header-icon-src="../../MeditationIcon.png"
      data-header-coming-soon="Android version is in development"
    ></div>

    <main class="page-main">
      <section class="group-hero" id="content-state">
        <div class="hero-status" id="page-status">Loading group details…</div>
        <h1 id="group-name">Group Details</h1>
        <p class="owner-line" id="group-owner-line">Owner: Zen Friend</p>
        <div class="description-card">
          <p id="group-description">Reading the public details attached to this invitation card.</p>
        </div>
      </section>

      <section class="members-section" id="members-section" hidden>
        <h2>Group Members</h2>
        <div class="member-shell">
          <div class="member-list" id="member-list"></div>
        </div>
      </section>

      <section class="error-state" id="error-state" hidden>
        <h2 id="error-title">Download ZenSee</h2>
        <p id="error-body">Group details are unavailable right now. You can still download ZenSee and try again later.</p>
      </section>
    </main>
  </div>

  <div class="join-bar">
    <div class="join-bar-inner">
      <button class="join-button" id="join-button" type="button">Join group</button>
    </div>
  </div>

  <script src="../../download/config.js"></script>
  <script src="../../shared-header.js"></script>
  <script src="../../download/app.js"></script>
  <script src="../config.js"></script>
  <script src="../app.js"></script>
</body>
</html>
